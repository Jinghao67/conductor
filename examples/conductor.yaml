root:
  id: CD-MAIN
  title: "[CD-MAIN][master] Project control room"
  mode: trunk
  status: active
  snapshot_id: snap-2026-06-03-001
  current_wave: 1
  active_interactive_branch_limit: 2

dispatch:
  id: CD-DISPATCH
  title: "[CD-DISPATCH][routing] Branch planning"
  type: dispatch
  status: optional
  merge_policy: final_decisions_only

explainer:
  id: CD-E01
  title: "[CD-E01][sidecar][explainer] Dirty questions"
  type: explainer
  status: active
  thread_id: thr_example_explainer
  context_access: all_sessions_on_demand
  authority: non_authoritative
  merge_policy: no_merge_by_default

waves:
  - wave: 0
    branches: [CD-MAIN]
    prerequisites: []
    gate_condition: scope_confirmed
  - wave: 1
    branches: [CD-001]
    prerequisites: [CD-MAIN]
    gate_condition: completion_report_ready
  - wave: 2
    branches: [CD-002]
    prerequisites: [CD-001]
    gate_condition: user_confirms_merge_or_next_step

branches:
  - id: CD-001
    stable_title: "[CD-001][W1][task] First confirmed branch"
    title: First confirmed branch
    type: branch
    interaction_mode: user_interactive
    role: task
    status: active
    task_dir: .trellis/tasks/first-branch
    thread_id: thr_example_first_branch
    merge_policy: explicit_user_confirm
    based_on_snapshot_id: snap-2026-06-03-001
    execution_wave: 1
    depends_on: [CD-MAIN]
    unblocks: [CD-002]
    start_policy: current_wave_only
    gate_condition: completion_report_ready
    return_condition: branch output reviewed and user confirms completion
    branch_brief_path: .trellis/tasks/first-branch/branch-brief.md
    completion_report_path: .trellis/tasks/first-branch/completion-report.md

  - id: CD-002
    stable_title: "[CD-002][W2][implement] Implementation plan"
    title: Implementation plan from CD-001
    type: branch
    interaction_mode: user_interactive
    role: implementation
    status: planned
    task_dir: .trellis/tasks/implementation-plan
    thread_id:
    merge_policy: explicit_user_confirm
    based_on_snapshot_id: snap-2026-06-03-001
    execution_wave: 2
    depends_on: [CD-001]
    unblocks: []
    start_policy: wait_for_prerequisite
    gate_condition: CD-001 completion_report_ready
    return_condition: implementation plan drafted from approved CD-001 output

snapshots:
  - id: snap-2026-06-03-001
    created_at: 2026-06-03
    note: Initial conductor registry.
